<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Mascota: Misión Multiplicación</title>
    <style>
        /* =========================================
           DISEÑO INFANTIL - GUARDERÍA ESPACIAL (VERSIÓN COMPLETA)
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');

        :root {
            --bg-color: #1a0b2e;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --primary: #00f0ff;
            --accent: #ffb800; /* Color estrella/comida */
            --correct: #00ff88;
            --wrong: #ff6b6b;
            --text-main: #ffffff;
            --tip-bg: rgba(156, 39, 176, 0.3); /* Color para los Neuro-Tips */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #2a114f 0%, #1a0b2e 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Estrellas de fondo animadas */
        .stars-bg {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.3;
            z-index: -1;
            animation: twinkle 10s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        /* Contenedor Principal con Glassmorphism */
        .game-container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 600px; /* Un poco más ancho para los textos de las misiones */
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            margin: 2rem 0;
        }

        /* Cabecera y Contador de Estrellas */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .stars-counter {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-family: 'Fredoka One', cursive;
            color: var(--accent);
            border: 2px solid var(--accent);
            box-shadow: 0 0 10px rgba(255, 184, 0, 0.3);
        }

        /* Navegación de Modos de Juego */
        .mode-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--primary);
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Área de la Mascota */
        .mascot-area {
            margin: 10px 0;
        }

        .mascot-emoji {
            font-size: 6rem;
            margin: 0 auto;
            transition: transform 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .mascot-emoji.eating {
            animation: bounce 0.5s ease;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Barra de Energía */
        .energy-label {
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .energy-bar-container {
            width: 100%;
            height: 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .energy-fill {
            height: 100%;
            width: 30%; /* Estado inicial */
            background: linear-gradient(90deg, #ff007f, var(--primary));
            border-radius: 15px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Área de Preguntas y Misiones */
        .question-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
        }

        .story-text {
            font-size: 1.3rem;
            color: #e0e0e0;
            margin-bottom: 15px;
            line-height: 1.5;
            display: none; /* Se oculta por defecto, se muestra en Misiones */
        }

        .question-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            margin: 10px 0;
            color: #fff;
        }

        /* Cajón de Neuro-Tips (Astro-Secretos) */
        .neuro-tip {
            background: var(--tip-bg);
            border: 2px dashed #d500f9;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1.1rem;
            display: none; /* Oculto hasta que se equivoque */
            animation: fadeIn 0.5s;
        }

        .neuro-tip span.title {
            font-weight: bold;
            color: #e040fb;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botones de Opciones */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: linear-gradient(145deg, #2a114f, #3b1b6e);
            border: 2px solid var(--primary);
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            padding: 15px 5px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #1a0b2e;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #1a0b2e, 0 0 15px var(--primary);
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1a0b2e;
        }

        .option-btn.correct { background: var(--correct); border-color: #fff; color: #000; }
        .option-btn.wrong { background: var(--wrong); border-color: #fff; color: #000; opacity: 0.8; }

        /* Pantalla de Nivel Completado */
        #level-up-screen {
            display: none;
            text-align: center;
        }

        .restart-btn {
            background: var(--correct);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            border-radius: 20px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 #009955;
            transition: transform 0.2s ease;
        }
        
        .restart-btn:hover { 
            transform: scale(1.05); 
        }

    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div class="game-container">
        <div class="header">
            <h1>Astro-Mascota</h1>
            <div class="stars-counter">⭐ <span id="stars-score">0</span></div>
        </div>

        <div class="mode-nav">
            <button class="mode-btn active" id="btn-flash" onclick="setMode('flash')">⚡ Snack Rápido</button>
            <button class="mode-btn" id="btn-story" onclick="setMode('story')">🌍 Misiones</button>
        </div>

        <div id="game-screen">
            <div class="mascot-area">
                <div class="mascot-emoji" id="mascot">🥺</div>
            </div>

            <div class="energy-label" id="energy-text">Nivel de Energía: Hambriento</div>
            <div class="energy-bar-container">
                <div class="energy-fill" id="energy-bar"></div>
            </div>

            <div class="question-box">
                <div id="story-container" class="story-text"></div>
                
                <div class="question-text" id="question">2 x 3 = ?</div>
                
                <div class="options-grid" id="options">
                    </div>
            </div>
            
            <div class="neuro-tip" id="neuro-tip-box">
                <span class="title">🧠 Astro-Secreto:</span> 
                <span id="neuro-tip-text" style="color:white; font-weight:normal; display:block; margin-top:5px;"></span>
            </div>
        </div>

        <div id="level-up-screen">
            <div class="mascot-emoji" style="font-size: 8rem;">🥳🚀</div>
            <h2 style="font-family: 'Fredoka One'; color: var(--correct); font-size: 2.2rem;">¡Energía al Máximo!</h2>
            <p style="font-size: 1.2rem;">¡El cerebro de tu mascota y el tuyo han crecido muchísimo hoy! Las neuronas están felices.</p>
            <button class="restart-btn" onclick="resetGame()">Jugar de Nuevo</button>
        </div>
    </div>

    <script>
        // ==========================================
        // BASE DE DATOS EDUCATIVA
        // ==========================================
        const tables = [2, 3, 4, 5, 6];

        // Misiones de Pensamiento Matemático (Adaptado a su edad y contexto colombiano)
        const missions = [
            { tipo: "Espacial", texto: "Para construir una reserva espacial para el Cóndor Andino, necesitamos 3 filas con 4 bloques de energía cada una. ¿Cuántos bloques usamos en total?", ans: 12 },
            { tipo: "Numérico", texto: "El robot plantó Palmas de Cera estelares. Tiene 5 macetas y en cada una puso 5 semillas. ¿Cuántas semillas plantó en total?", ans: 25 },
            { tipo: "Métrico", texto: "Cada salto que da la mascota espacial avanza 4 metros. Si da 6 saltos para atrapar una estrella, ¿cuántos metros avanzó?", ans: 24 },
            { tipo: "Espacial", texto: "En la nave hay 4 cajas cuadradas. Cada caja tiene 6 frailejones mágicos guardados. ¿Cuántos frailejones hay listos para plantar?", ans: 24 },
            { tipo: "Numérico", texto: "La mascota necesita tomar 2 biberones de polvo estelar cada día. ¿Cuántos biberones tomará en 5 días?", ans: 10 },
            { tipo: "Variacional", texto: "Por cada planeta nuevo que visitamos, ganamos 3 medallas. Si hoy visitamos 6 planetas, ¿cuántas medallas tenemos?", ans: 18 }
        ];
        
        // Tips de Neurociencia (Mindset de Crecimiento)
        const neuroTips = [
            "¡Equivocarse es genial! Tu cerebro acaba de crear una conexión neuronal nueva para aprender.",
            "Truco de Espejo: 4x3 es lo mismo que 3x4. ¡Acabas de ahorrarle trabajo a tu memoria!",
            "Si olvidas una, usa la suma: Si no recuerdas 5x4, piensa en 5+5+5+5.",
            "Usa tus dedos como supercomputadoras. ¡Cierra los ojos e imagina los números saltando!",
            "El cerebro ama el ritmo. Trata de cantar la tabla como si fuera tu canción favorita.",
            "A tu edad, el cerebro es como una esponja brillante. ¡Cada número que intentas te hace más inteligente!"
        ];

        // ==========================================
        // VARIABLES DE ESTADO DEL JUEGO
        // ==========================================
        let currentMode = 'flash'; // 'flash' (Snack) o 'story' (Misiones)
        let currentAnswer = 0;
        let energy = 30; // Inicia con 30% de energía
        let stars = 0;
        let isWaiting = false; // Bloqueo temporal para evitar múltiples clics rápidos

        // ==========================================
        // ELEMENTOS DEL DOM
        // ==========================================
        const mascotEl = document.getElementById('mascot');
        const energyBarEl = document.getElementById('energy-bar');
        const energyTextEl = document.getElementById('energy-text');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const starsScoreEl = document.getElementById('stars-score');
        const storyContainerEl = document.getElementById('story-container');
        const neuroTipBoxEl = document.getElementById('neuro-tip-box');
        const neuroTipTextEl = document.getElementById('neuro-tip-text');
        const gameScreen = document.getElementById('game-screen');
        const levelUpScreen = document.getElementById('level-up-screen');
        const btnFlash = document.getElementById('btn-flash');
        const btnStory = document.getElementById('btn-story');

        // ==========================================
        // LÓGICA PRINCIPAL
        // ==========================================

        // Iniciar el juego por primera vez
        function initGame() {
            updateEnergyUI();
            generateQuestion();
        }

        // Cambiar entre modo rápido y modo misiones
        function setMode(mode) {
            currentMode = mode;
            
            // Actualizar botones visualmente
            if(mode === 'flash') {
                btnFlash.classList.add('active');
                btnStory.classList.remove('active');
            } else {
                btnFlash.classList.remove('active');
                btnStory.classList.add('active');
            }
            
            // Generar una nueva pregunta adaptada al modo
            generateQuestion();
        }

        // Crear la pregunta y las opciones
        function generateQuestion() {
            isWaiting = false;
            
            // Reiniciar visuales
            mascotEl.innerText = "🥺"; // Cara de espera
            mascotEl.classList.remove('eating');
            neuroTipBoxEl.style.display = "none"; // Ocultar el tip
            optionsEl.innerHTML = ""; // Limpiar botones anteriores

            if (currentMode === 'flash') {
                // MODO SNACK RÁPIDO (Cálculo mental directo)
                storyContainerEl.style.display = "none";
                
                const table = tables[Math.floor(Math.random() * tables.length)];
                const multiplier = Math.floor(Math.random() * 10) + 1;
                
                currentAnswer = table * multiplier;
                questionEl.innerText = `${table} x ${multiplier} = ?`;
                questionEl.style.fontSize = "2.5rem";
                
            } else {
                // MODO MISIONES (Problemas narrativos)
                const mission = missions[Math.floor(Math.random() * missions.length)];
                
                storyContainerEl.style.display = "block";
                storyContainerEl.innerHTML = `<strong>Misión (${mission.tipo}):</strong> ${mission.texto}`;
                
                currentAnswer = mission.ans;
                questionEl.innerText = "¿Cuál es la respuesta?";
                questionEl.style.fontSize = "1.8rem"; // Letra un poco más pequeña para dar espacio
            }

            generateOptionsButtons(currentAnswer);
        }

        // Generar los 3 botones (1 correcto, 2 distractores lógicos)
        function generateOptionsButtons(correctValue) {
            let optionsSet = new Set([correctValue]);
            
            while(optionsSet.size < 3) {
                // Generar respuestas cercanas para que la niña tenga que pensar
                const offset = Math.floor(Math.random() * 5) + 1; 
                const isPlus = Math.random() > 0.5;
                const wrongAnswer = isPlus ? correctValue + offset : correctValue - offset;
                
                // Evitar números negativos o ceros
                if(wrongAnswer > 0 && wrongAnswer !== correctValue) {
                    optionsSet.add(wrongAnswer);
                }
            }

            // Desordenar las opciones para que la correcta no esté siempre en el mismo lugar
            const finalOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);

            // Insertar botones en el HTML
            finalOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsEl.appendChild(btn);
            });
        }

        // Validar la respuesta al hacer clic
        function checkAnswer(selectedValue, btnElement) {
            if (isWaiting) return; // Evita que haga múltiples clics por error
            isWaiting = true;

            if (selectedValue === currentAnswer) {
                // =================================
                // RESPUESTA CORRECTA
                // =================================
                btnElement.classList.add('correct');
                mascotEl.innerText = "😋"; // Cara comiendo
                mascotEl.classList.add('eating');
                neuroTipBoxEl.style.display = "none";
                
                // Sistema de recompensas: Misiones dan más energía por ser más difíciles
                const energyGain = (currentMode === 'story') ? 25 : 15;
                const starsGain = (currentMode === 'story') ? 2 : 1;
                
                energy += energyGain; 
                stars += starsGain;
                starsScoreEl.innerText = stars;
                
                if (energy >= 100) energy = 100;
                updateEnergyUI();

                // Verificar si llenó la barra
                if (energy === 100) {
                    setTimeout(showLevelUp, 1000);
                } else {
                    setTimeout(generateQuestion, 1500); // Avanzar a la siguiente
                }

            } else {
                // =================================
                // RESPUESTA INCORRECTA
                // =================================
                btnElement.classList.add('wrong');
                mascotEl.innerText = "🤔"; // Cara pensativa, no regañona
                
                // Seleccionar un Neuro-Tip al azar y mostrarlo
                const randomTip = neuroTips[Math.floor(Math.random() * neuroTips.length)];
                neuroTipTextEl.innerText = randomTip;
                neuroTipBoxEl.style.display = "block";
                
                // Quitar el color rojo después de unos segundos para que vuelva a intentar
                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                    isWaiting = false; // Desbloquear para que intente de nuevo
                }, 2000);
            }
        }

        // Actualizar visualmente la barra y el texto de energía
        function updateEnergyUI() {
            energyBarEl.style.width = `${energy}%`;
            
            if (energy < 50) {
                energyTextEl.innerText = "Nivel de Energía: Hambriento";
            } else if (energy < 80) {
                energyTextEl.innerText = "Nivel de Energía: Satisfecho";
            } else {
                energyTextEl.innerText = "Nivel de Energía: ¡Casi Lleno!";
            }
        }

        // Mostrar la pantalla final
        function showLevelUp() {
            gameScreen.style.display = 'none';
            levelUpScreen.style.display = 'block';
        }

        // Reiniciar el juego (Mantiene las estrellas acumuladas como trofeo)
        function resetGame() {
            energy = 30;
            gameScreen.style.display = 'block';
            levelUpScreen.style.display = 'none';
            initGame();
        }

        // Arrancar el juego automáticamente al cargar la página
        initGame();
    </script>
</body>
</html>
