<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Mascota: Misión Multiplicación</title>
    <style>
        /* =========================================
           DISEÑO INFANTIL - GUARDERÍA ESPACIAL
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');

        :root {
            --bg-color: #1a0b2e;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --primary: #00f0ff;
            --accent: #ffb800; /* Color estrella/comida */
            --correct: #00ff88;
            --wrong: #ff6b6b;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #2a114f 0%, #1a0b2e 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Estrellas de fondo */
        .stars-bg {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.3;
            z-index: -1;
            animation: twinkle 10s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        /* Contenedor Principal */
        .game-container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Cabecera y Contador de Estrellas */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .stars-counter {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-family: 'Fredoka One', cursive;
            color: var(--accent);
            border: 2px solid var(--accent);
            box-shadow: 0 0 10px rgba(255, 184, 0, 0.3);
        }

        /* El Astro-Mascota */
        .mascot-area {
            margin: 20px 0;
        }

        .mascot-emoji {
            font-size: 6rem;
            margin: 0 auto;
            transition: transform 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .mascot-emoji.eating {
            animation: bounce 0.5s ease;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Barra de Energía */
        .energy-label {
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .energy-bar-container {
            width: 100%;
            height: 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden;
            position: relative;
        }

        .energy-fill {
            height: 100%;
            width: 30%; /* Estado inicial */
            background: linear-gradient(90deg, #ff007f, var(--primary));
            border-radius: 15px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Área de Preguntas */
        .question-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .question-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            margin: 10px 0;
            color: #fff;
        }

        /* Botones de Opciones */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .option-btn {
            background: linear-gradient(145deg, #2a114f, #3b1b6e);
            border: 2px solid var(--primary);
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            padding: 15px 5px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #1a0b2e;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #1a0b2e, 0 0 15px var(--primary);
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1a0b2e;
        }

        .option-btn.correct { background: var(--correct); border-color: #fff; color: #000; }
        .option-btn.wrong { background: var(--wrong); border-color: #fff; color: #000; opacity: 0.8; }

        /* Mensaje de Feedback */
        .feedback-msg {
            height: 30px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Pantalla de Nivel Completado */
        #level-up-screen {
            display: none;
            text-align: center;
        }

        .restart-btn {
            background: var(--correct);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            border-radius: 20px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 #009955;
        }
        .restart-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div class="game-container">
        <div class="header">
            <h1>Astro-Mascota</h1>
            <div class="stars-counter">⭐ <span id="stars-score">0</span></div>
        </div>

        <div id="game-screen">
            <div class="mascot-area">
                <div class="mascot-emoji" id="mascot">🥺</div>
            </div>

            <div class="energy-label" id="energy-text">Nivel de Energía: Hambriento</div>
            <div class="energy-bar-container">
                <div class="energy-fill" id="energy-bar"></div>
            </div>

            <div class="question-box">
                <p style="margin:0; color:#b0c4de;">¿Qué bocadillo necesita comer?</p>
                <div class="question-text" id="question">2 x 3 = ?</div>
                
                <div class="options-grid" id="options">
                    </div>
            </div>
            
            <div class="feedback-msg" id="feedback"></div>
        </div>

        <div id="level-up-screen">
            <div class="mascot-emoji" style="font-size: 8rem;">🥳🚀</div>
            <h2 style="font-family: 'Fredoka One'; color: var(--correct); font-size: 2rem;">¡Mascota Feliz!</h2>
            <p style="font-size: 1.2rem;">Has alimentado a tu Astro-Mascota con mucha energía matemática. ¡Buen trabajo espacial!</p>
            <button class="restart-btn" onclick="resetGame()">Jugar de Nuevo</button>
        </div>
    </div>

    <script>
        // ESTADO DEL JUEGO
        const tables = [2, 3, 4, 5, 6];
        let currentAnswer = 0;
        let energy = 30; // Inicia con 30% de energía
        let stars = 0;
        let isWaiting = false; // Previene múltiples clics

        // ELEMENTOS DEL DOM
        const mascotEl = document.getElementById('mascot');
        const energyBarEl = document.getElementById('energy-bar');
        const energyTextEl = document.getElementById('energy-text');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const feedbackEl = document.getElementById('feedback');
        const starsScoreEl = document.getElementById('stars-score');
        const gameScreen = document.getElementById('game-screen');
        const levelUpScreen = document.getElementById('level-up-screen');

        // INICIALIZACIÓN
        function initGame() {
            updateEnergyUI();
            generateQuestion();
        }

        // GENERAR PREGUNTA
        function generateQuestion() {
            isWaiting = false;
            mascotEl.innerText = "🥺"; // Cara de hambre/espera
            mascotEl.classList.remove('eating');
            feedbackEl.innerText = "";
            optionsEl.innerHTML = "";

            // Elegir tabla y número al azar
            const table = tables[Math.floor(Math.random() * tables.length)];
            const multiplier = Math.floor(Math.random() * 10) + 1;
            currentAnswer = table * multiplier;

            // Mostrar pregunta
            questionEl.innerText = `${table} x ${multiplier} = ?`;

            // Generar opciones
            let optionsSet = new Set([currentAnswer]);
            while(optionsSet.size < 3) {
                // Generar respuestas cercanas para que piense (sumando o restando un poco)
                const offset = (Math.floor(Math.random() * 3) + 1) * table; 
                const isPlus = Math.random() > 0.5;
                const wrongAnswer = isPlus ? currentAnswer + offset : currentAnswer - offset;
                if(wrongAnswer > 0) optionsSet.add(wrongAnswer);
            }

            // Desordenar opciones
            const finalOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);

            // Crear botones
            finalOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsEl.appendChild(btn);
            });
        }

        // COMPROBAR RESPUESTA
        function checkAnswer(selected, btnElement) {
            if (isWaiting) return;
            isWaiting = true;

            if (selected === currentAnswer) {
                // RESPUESTA CORRECTA
                btnElement.classList.add('correct');
                mascotEl.innerText = "😋"; // Cara comiendo rico
                mascotEl.classList.add('eating');
                feedbackEl.innerHTML = '<span style="color: var(--correct)">¡Qué rico! +Energía</span>';
                
                // Aumentar energía y estrellas
                energy += 15; // Sube 15% por acierto
                stars += 1;
                starsScoreEl.innerText = stars;
                
                if (energy >= 100) energy = 100;
                updateEnergyUI();

                // Revisar si ganó
                if (energy === 100) {
                    setTimeout(showLevelUp, 1000);
                } else {
                    setTimeout(generateQuestion, 1500); // Siguiente pregunta en 1.5s
                }

            } else {
                // RESPUESTA INCORRECTA
                btnElement.classList.add('wrong');
                mascotEl.innerText = "🤔"; // Cara pensativa, no triste
                feedbackEl.innerHTML = '<span style="color: var(--wrong)">Ese bocadillo no era. ¡Intenta de nuevo!</span>';
                
                // Dejar que intente de nuevo rápido sin cambiar la pregunta
                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                    mascotEl.innerText = "🥺";
                    feedbackEl.innerText = "";
                    isWaiting = false;
                }, 1500);
            }
        }

        // ACTUALIZAR BARRA DE ENERGÍA
        function updateEnergyUI() {
            energyBarEl.style.width = `${energy}%`;
            
            if (energy < 50) {
                energyTextEl.innerText = "Nivel de Energía: Hambriento";
            } else if (energy < 80) {
                energyTextEl.innerText = "Nivel de Energía: Satisfecho";
            } else {
                energyTextEl.innerText = "Nivel de Energía: ¡Casi Lleno!";
            }
        }

        // PANTALLA DE VICTORIA
        function showLevelUp() {
            gameScreen.style.display = 'none';
            levelUpScreen.style.display = 'block';
        }

        // REINICIAR JUEGO (Mantiene las estrellas acumuladas)
        function resetGame() {
            energy = 30;
            gameScreen.style.display = 'block';
            levelUpScreen.style.display = 'none';
            initGame();
        }

        // Arrancar el juego al cargar
        initGame();
    </script>
</body>
</html>
